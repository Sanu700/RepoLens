<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- viewport-fit=cover fixes notch/safe area on iPhone, maximum-scale=1 prevents zoom on input focus -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050810" />
    <meta name="description" content="RepoLens — Analyze any GitHub repository or developer profile. Get productivity scores, insights, skill radar, dev persona and more." />
    <meta property="og:title" content="RepoLens — GitHub Intelligence" />
    <meta property="og:description" content="Analyze any GitHub repo or developer profile instantly." />
    <meta property="og:type" content="website" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />

    <title>RepoLens — GitHub Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
      /* Prevent flash of unstyled content */
      body { background: #050810; margin: 0; }
      /* Fix iOS input zoom */
      input, select, textarea { font-size: 16px !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
